name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  python:
    name: Python package
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile Python
        run: python -m compileall windows_mcp_server

      - name: Count registered tools
        run: |
          python -c "from windows_mcp_server.registry import register_all_tools, registered_tools; Dummy = type('Dummy', (), {'tool': lambda self: (lambda f: f)}); register_all_tools(Dummy()); count = len(registered_tools); print(f'Registered tools: {count}'); assert count == 96, count"

  vscode-extension:
    name: VS Code extension
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: npm run compile
